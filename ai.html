<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <title>SmartAir AI · Assistant</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg">

  <!-- NAV -->
  <nav class="apple-nav">
    <div class="logo-text">SmartAir AI</div>
    <button id="toDash" class="apple-btn">Dashboard</button>
  </nav>

  <!-- CHAT -->
  <main class="chat-wrapper">

    <div id="chatWindow" class="chat-window"></div>

    <div class="chat-input-bar">
      <input id="userInput" placeholder="Ask about air, health, prediction..." />
      <button id="micBtn">🎤</button>
      <button id="sendBtn">➤</button>
    </div>

  </main>

  <script src="app.js"></script>

</body>
</html>
