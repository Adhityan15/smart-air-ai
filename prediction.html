<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <title>SmartAir AI · Prediction</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg">

  <!-- NAV -->
  <nav class="apple-nav">
    <div class="logo-text">SmartAir AI</div>

    <div class="nav-actions">
      <button id="toDash" class="apple-btn">Dashboard</button>
      <button id="toAI" class="apple-btn">AI</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="apple-container">

    <!-- 🔥 PREDICTION CARD -->
    <section class="glass-card">
      <h2>📈 AI Prediction</h2>

      <h1 id="predictionValue">--</h1>
      <p class="muted">Predicted Air Quality (Next)</p>
    </section>

    <!-- 🔥 INSIGHTS -->
    <section class="glass-card">
      <h3>🤖 AI Analysis</h3>
      <div id="predictionText">Waiting for data...</div>
    </section>

    <!-- 🔥 GRAPH -->
    <section class="glass-card">
      <h3>📊 Trend Forecast</h3>
      <canvas id="predictionChart"></canvas>
    </section>

  </main>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
