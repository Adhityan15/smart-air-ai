<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SmartAir AI · Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body class="bg">

  <!-- 🔥 BACKGROUND PARTICLES -->
  <div class="particles"></div>

  <div class="login-wrapper">

    <!-- LEFT -->
    <div class="brand-section fade-in">
      <h1 class="brand-title glow-text">SmartAir AI</h1>
      <p class="brand-sub">AI-powered Air & Health Intelligence</p>

      <div class="features">
        <div class="feature-card">🌫 Real-time Air Quality</div>
        <div class="feature-card">🧠 AI Health Insights</div>
        <div class="feature-card">📈 Predictive Analytics</div>
        <div class="feature-card">🔊 Voice Assistant</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="login-card neon-card slide-in">

      <div class="logo-container">
        <img src="logo-placeholder.png" class="logo animated-logo"/>
      </div>

      <h2 class="neon-text">Welcome Back</h2>
      <p class="muted">Login to continue</p>

      <form id="loginForm" class="form">
        <input id="username" placeholder="Username" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit" class="btn glow-btn">Login</button>
      </form>

      <p class="muted small">SmartAir AI © Adhityan</p>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
